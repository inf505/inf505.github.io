<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vue CDN Project</title>
        <link rel="stylesheet" href="style.css" />
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    </head>
    <body>
        <div id="app">
            <button class="mobile-menu-btn" @click="toggleSidebar">☰</button>
            <div class="main-container">
                <aside :class="['sidebar', { 'sidebar-open': isSidebarOpen }]">
                    <div class="sidebar-header">
                        <strong>Life Engine</strong>
                    </div>
                    <div class="controls">
                        <button @click="togglePlay" class="play-btn">
                            <i :data-lucide="isPlaying ? 'pause' : 'play'"></i>
                            <span style="margin-left: 8px"
                                >{{ isPlaying ? 'Stop' : 'Start' }}</span
                            >
                        </button>
                    </div>
                </aside>
                <main class="content">
                    <h1>Welcome</h1>
                    <p>
                        The header is gone. On mobile, use the floating button
                        in the top-left to open the menu.
                    </p>
                </main>
            </div>
            <div
                v-if="isSidebarOpen"
                class="overlay"
                @click="toggleSidebar"
            ></div>
        </div>
        <script src="https://unpkg.com/primevue/umd/primevue.min.js"></script>
        <script src="https://unpkg.com/lucide@1.11.0/dist/umd/lucide.min.js></script>
        <script src="app.js"></script>
    </body>
</html>
