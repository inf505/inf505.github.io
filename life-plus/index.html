<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Life Plus</title>
        <link
            rel="stylesheet"
            href="https://unpkg.com/primeicons/primeicons.css"
        />
        <link rel="stylesheet" href="style.css" />

        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
        <script src="https://unpkg.com/primevue/umd/primevue.min.js"></script>
        <script src="https://unpkg.com/@primeuix/themes/umd/aura.js"></script>
    </head>
    <body>
        <div id="app">
            <button class="mobile-menu-btn" @click="toggleSidebar">
                <i class="pi pi-bars"></i>
            </button>

            <div class="main-container">
                <aside :class="['sidebar', { 'sidebar-open': isSidebarOpen }]">
                    <div class="sidebar-header">
                        <i
                            class="pi pi-box"
                            style="color: var(--p-primary-color)"
                        ></i>
                        <strong>Life Plus</strong>
                    </div>

                    <div class="sidebar-content">
                        <!-- Playback Controls -->
                        <span class="section-label">Controls</span>
                        <div class="control-group">
                            <p-button
                                :label="isRunning ? 'Pause' : 'Play'"
                                :icon="isRunning ? 'pi pi-pause' : 'pi pi-play'"
                                @click="togglePlay"
                                class="w-full"
                                size="small"
                            ></p-button>
                            <p-button
                                label="Step"
                                icon="pi pi-step-forward"
                                severity="secondary"
                                @click="step"
                                :disabled="isRunning"
                                class="w-full"
                                size="small"
                            ></p-button>
                            <p-button
                                label="Randomize"
                                icon="pi pi-refresh"
                                severity="info"
                                @click="randomize"
                                class="w-full"
                                size="small"
                            ></p-button>
                            <p-button
                                label="Clear"
                                icon="pi pi-trash"
                                severity="danger"
                                outlined
                                @click="clear"
                                class="w-full"
                                size="small"
                            ></p-button>
                        </div>

                        <!-- NEW: Ruleset Controls -->
                        <div class="mt-4">
                            <span class="section-label">Ruleset (B/S)</span>
                            <div class="control-group">
                                <p-select
                                    v-model="selectedPreset"
                                    :options="rulePresets"
                                    option-label="name"
                                    class="w-full"
                                    size="small"
                                >
                                </p-select>

                                <div class="rules-inputs">
                                    <div class="rule-input">
                                        <label>Birth</label>
                                        <p-inputtext
                                            v-model="birthRule"
                                            placeholder="e.g. 3"
                                            size="small"
                                        />
                                    </div>
                                    <div class="rule-input">
                                        <label>Survive</label>
                                        <p-inputtext
                                            v-model="survivalRule"
                                            placeholder="e.g. 23"
                                            size="small"
                                        />
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Settings Section -->
                        <div class="mt-4">
                            <span class="section-label">Settings</span>
                            <div class="control-group">
                                <div class="setting-item">
                                    <label>Speed ({{ speed }} FPS)</label>
                                    <p-slider
                                        v-model="speed"
                                        :min="1"
                                        :max="60"
                                    ></p-slider>
                                </div>
                                <div class="setting-item">
                                    <label>Cell Size ({{ cellSize }}px)</label>
                                    <p-slider
                                        v-model="cellSize"
                                        :min="4"
                                        :max="50"
                                        @change="resizeCanvas"
                                    ></p-slider>
                                </div>
                                <div class="setting-item">
                                    <label
                                        >Spawn Density ({{ density }}%)</label
                                    >
                                    <p-slider
                                        v-model="density"
                                        :min="1"
                                        :max="99"
                                    ></p-slider>
                                </div>
                            </div>
                        </div>
                    </div>
                </aside>

                <main class="content">
                    <div class="card">
                        <h2 class="card-title">Simulation</h2>
                        <div class="canvas-container" ref="canvasWrapper">
                            <canvas
                                ref="gameCanvas"
                                @click="toggleCell"
                            ></canvas>
                        </div>
                    </div>
                </main>
            </div>

            <div
                v-if="isSidebarOpen"
                class="overlay"
                @click="toggleSidebar"
            ></div>
        </div>

        <script src="app.js"></script>
    </body>
</html>
