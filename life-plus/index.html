<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vue CDN Project</title>
        <link rel="stylesheet" href="style.css" />
        <link
            href="https://unpkg.com/primevue/resources/themes/lara-light-green/theme.css"
            rel="stylesheet"
        />
        <link
            href="https://unpkg.com/primevue/resources/primevue.min.css"
            rel="stylesheet"
        />
        <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    </head>
    <body>
        <div id="app">
            <!-- Floating Toggle for Mobile -->
            <button class="mobile-menu-btn" @click="toggleSidebar">☰</button>

            <div class="main-container">
                <!-- Sidebar -->
                <aside :class="['sidebar', { 'sidebar-open': isSidebarOpen }]">
                    <div class="sidebar-header">
                        <strong>Life Engine</strong>
                    </div>

                    <!-- Game Controls Section -->
                    <div class="controls">
                        <div>
                            <label style="font-size: 0.8rem; color: #666"
                                >Simulation Speed</label
                            >
                            <p style="margin-bottom: 10px">{{ speed }}ms</p>
                            <p-slider
                                v-model="speed"
                                :min="10"
                                :max="1000"
                            ></p-slider>
                        </div>

                        <button @click="togglePlay" class="play-btn">
                            <i :data-lucide="isPlaying ? 'pause' : 'play'"></i>
                            <span style="margin-left: 8px"
                                >{{ isPlaying ? 'Stop' : 'Start' }}</span
                            >
                        </button>
                    </div>
                </aside>

                <!-- Main Content Area -->
                <main class="content">
                    <h1>Welcome</h1>
                    <p>
                        The header is gone. On mobile, use the floating button
                        in the top-left to open the menu.
                    </p>
                </main>
            </div>

            <!-- Overlay -->
            <div
                v-if="isSidebarOpen"
                class="overlay"
                @click="toggleSidebar"
            ></div>
        </div>

        <!-- 2. UI Libraries (The Tools) -->
        <!-- PrimeVue (Optional, if you use it) -->
        <script src="https://unpkg.com/primevue/core/core.min.js"></script>
        <script src="https://unpkg.com/primevue/slider/slider.min.js"></script>

        <!-- Lucide Icons (Item #3) -->
        <script src="https://unpkg.com/lucide@latest"></script>

        <!-- 3. Your Code (The Logic) -->
        <script src="app.js"></script>
    </body>
</html>
