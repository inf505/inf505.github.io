<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vue CDN Project</title>
        <link rel="stylesheet" href="style.css" />
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    </head>
    <body>
        <div id="app">
            <!-- Floating Toggle for Mobile -->
            <button class="mobile-menu-btn" @click="toggleSidebar">☰</button>

            <div class="main-container">
                <!-- Sidebar -->
                <aside :class="['sidebar', { 'sidebar-open': isSidebarOpen }]">
                    <div class="sidebar-header">
                        <strong>MyProject</strong>
                    </div>
                    <nav>
                        <ul>
                            <li><a href="#">Dashboard</a></li>
                            <li><a href="#">Projects</a></li>
                            <li><a href="#">Settings</a></li>
                            <li><a href="#">Profile</a></li>
                        </ul>
                    </nav>
                </aside>

                <!-- Main Content Area -->
                <main class="content">
                    <h1>Welcome</h1>
                    <p>
                        The header is gone. On mobile, use the floating button
                        in the top-left to open the menu.
                    </p>
                </main>
            </div>

            <!-- Overlay -->
            <div
                v-if="isSidebarOpen"
                class="overlay"
                @click="toggleSidebar"
            ></div>
        </div>

        <script src="app.js"></script>
    </body>
</html>
