<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Life Engine</title>
        <link
            rel="stylesheet"
            href="https://unpkg.com/primeicons/primeicons.css"
        />
        <link rel="stylesheet" href="style.css" />

        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
        <script src="https://unpkg.com/primevue/umd/primevue.min.js"></script>
        <script src="https://unpkg.com/@primeuix/themes/umd/aura.js"></script>
    </head>
    <body>
        <div id="app">
            <button class="mobile-menu-btn" @click="toggleSidebar">
                <i class="pi pi-bars"></i>
            </button>

            <div class="main-container">
                <aside :class="['sidebar', { 'sidebar-open': isSidebarOpen }]">
                    <div class="sidebar-header">
                        <i
                            class="pi pi-box"
                            style="color: var(--p-primary-color)"
                        ></i>
                        <strong>Life Engine</strong>
                    </div>

                    <div class="sidebar-content">
                        <span class="section-label">Controls</span>
                        <div class="control-group">
                            <!-- Bound Buttons to Vue methods -->
                            <p-button
                                :label="isRunning ? 'Pause' : 'Play'"
                                :icon="isRunning ? 'pi pi-pause' : 'pi pi-play'"
                                @click="togglePlay"
                                class="w-full"
                                size="small"
                            >
                            </p-button>
                            <p-button
                                label="Step"
                                icon="pi pi-step-forward"
                                severity="secondary"
                                @click="step"
                                :disabled="isRunning"
                                class="w-full"
                                size="small"
                            >
                            </p-button>
                            <p-button
                                label="Randomize"
                                icon="pi pi-refresh"
                                severity="info"
                                @click="randomize"
                                class="w-full"
                                size="small"
                            >
                            </p-button>
                            <p-button
                                label="Clear"
                                icon="pi pi-trash"
                                severity="danger"
                                outlined
                                @click="clear"
                                class="w-full"
                                size="small"
                            >
                            </p-button>
                        </div>
                    </div>
                </aside>

                <main class="content">
                    <div class="card">
                        <h2 class="card-title">Game of Life</h2>
                        <!-- Replaced placeholder with Canvas -->
                        <div class="canvas-container" ref="canvasWrapper">
                            <canvas
                                ref="gameCanvas"
                                @click="toggleCell"
                            ></canvas>
                        </div>
                    </div>
                </main>
            </div>

            <div
                v-if="isSidebarOpen"
                class="overlay"
                @click="toggleSidebar"
            ></div>
        </div>

        <script src="app.js"></script>
    </body>
</html>
